<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b8c4"/>
      <stop offset="100%" stop-color="#6b4fef"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cloud icon -->
  <g transform="translate(10, 18)">
    <path d="M68 52c-1.5 0-3 .2-4.4.5C59.6 38.4 47.2 28 32.5 28c-10 0-18.8 5.1-23.8 12.9C4.2 41.4 1 45.1 1 49.5 1 55.3 5.7 60 11.5 60h56.5c7.5 0 13.5-6 13.5-13.5S75.5 33 68 33c0-2.8-.9-5.4-2.4-7.5"
          fill="none" stroke="url(#cloud-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
    <path d="M56 48c-1.2 0-2.4.1-3.5.4C49.4 37.2 40.6 29 30 29c-7.2 0-13.6 3.5-17.5 8.9C9.4 38.4 7 41.3 7 44.7 7 49 10.5 52.5 14.8 52.5H56c5.4 0 9.8-4.4 9.8-9.8S61.4 33 56 33"
          fill="none" stroke="url(#cloud-grad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
    <path d="M48 44c-.8 0-1.6.1-2.3.3C43.4 36 37.2 30 29.5 30c-5.2 0-9.8 2.8-12.3 7C14.7 37.5 13 39.3 13 41.5 13 44 15 46 17.5 46H48c3.6 0 6.5-2.9 6.5-6.5S51.6 33 48 33"
          fill="none" stroke="url(#cloud-grad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Terminal cursor >_ -->
  <g transform="translate(16, 52)" filter="url(#glow)">
    <text font-family="'Courier New', 'SF Mono', 'Consolas', monospace" font-size="36" font-weight="bold" fill="url(#cloud-grad)">
      <tspan>&gt;_</tspan>
    </text>
  </g>

  <!-- Text: CloudSSH -->
  <text x="105" y="78" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="-1">
    <tspan fill="url(#text-grad)">Cloud</tspan><tspan fill="url(#cloud-grad)">SSH</tspan>
  </text>

  <!-- Subtle scan line effect -->
  <line x1="105" y1="84" x2="460" y2="84" stroke="url(#cloud-grad)" stroke-width="1" opacity="0.12"/>
</svg>
